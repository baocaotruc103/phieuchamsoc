<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách đánh giá mẫu phiếu chăm sóc</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        background: #f3f6fa;
      }

      .feedback-dashboard {
        min-height: 100vh;
      }

      .feedback-header {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid #dbe4ee;
        background: #fff;
      }

      .feedback-header h1 {
        margin: 0;
        color: #0f172a;
        font-size: 20px;
        line-height: 1.2;
      }

      .feedback-header p {
        margin: 3px 0 0;
        color: #64748b;
        font-size: 13px;
        font-weight: 700;
      }

      .feedback-main {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .feedback-main > * {
        min-width: 0;
      }

      .feedback-stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }

      .feedback-stat-card {
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        background: #fff;
        padding: 13px;
      }

      .feedback-stat-card span {
        display: block;
        color: #64748b;
        font-size: 12px;
        font-weight: 800;
      }

      .feedback-stat-card strong {
        display: block;
        margin-top: 4px;
        color: #0f172a;
        font-size: 24px;
        line-height: 1.15;
      }

      .feedback-stat-detail {
        display: grid;
        gap: 3px;
        margin-top: 8px;
        padding-top: 7px;
        border-top: 1px dashed #e2e8f0;
        color: #64748b;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.35;
      }

      .feedback-filter {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        background: #fff;
        padding: 12px 14px;
      }

      .feedback-filter-field {
        display: grid;
        gap: 5px;
        flex: 1 1 auto;
        min-width: 0;
      }

      .feedback-filter-field > span {
        color: #475569;
        font-size: 12px;
        font-weight: 800;
      }

      .feedback-department-options {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
        gap: 6px;
        width: 100%;
        max-height: 126px;
        overflow-y: auto;
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        background: #f8fafc;
        padding: 7px;
      }

      .feedback-department-option {
        display: flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #fff;
        padding: 6px 8px;
        color: #0f172a;
        font-size: 12px;
        font-weight: 700;
      }

      .feedback-department-option input {
        flex: 0 0 auto;
        width: 15px;
        height: 15px;
        margin: 0;
      }

      .feedback-filter-summary {
        margin: 0;
        color: #64748b;
        font-size: 13px;
        font-weight: 700;
      }

      .feedback-filter-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .feedback-table-wrap {
        max-width: 100%;
        overflow-x: auto;
      }

      .feedback-table {
        width: 100%;
        min-width: 900px;
        border-collapse: collapse;
        font-size: 13px;
      }

      .feedback-table th,
      .feedback-table td {
        border-bottom: 1px solid #e2e8f0;
        padding: 9px 10px;
        text-align: left;
        vertical-align: top;
      }

      .feedback-table th {
        position: sticky;
        top: 0;
        background: #f8fafc;
        color: #334155;
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .feedback-table td {
        color: #0f172a;
      }

      .feedback-muted {
        color: #64748b;
        font-size: 12px;
      }

      .feedback-empty {
        border: 1px dashed #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        padding: 18px;
        color: #64748b;
        font-weight: 700;
        text-align: center;
      }

      @media (max-width: 640px) {
        .feedback-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .feedback-header .btn {
          width: 100%;
        }

        .feedback-main {
          padding: 10px;
          gap: 10px;
        }

        .feedback-stat-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .feedback-stat-card {
          min-height: 76px;
          padding: 10px;
        }

        .feedback-stat-card span {
          font-size: 11px;
          line-height: 1.25;
        }

        .feedback-stat-card strong {
          margin-top: 5px;
          font-size: 21px;
        }

        .feedback-filter {
          align-items: stretch;
          flex-direction: column;
          padding: 10px;
        }

        .feedback-filter-field {
          min-width: 0;
        }

        .feedback-department-options {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          max-height: 178px;
        }

        .feedback-filter-actions {
          justify-content: space-between;
        }

        .feedback-table-wrap {
          overflow: visible;
        }

        .feedback-table {
          display: block;
          min-width: 0;
        }

        .feedback-table thead {
          display: none;
        }

        .feedback-table tbody {
          display: grid;
          gap: 10px;
        }

        .feedback-table tr {
          display: grid;
          gap: 0;
          border: 1px solid #e2e8f0;
          border-radius: 8px;
          background: #fff;
          padding: 5px 10px;
        }

        .feedback-table td {
          display: grid;
          grid-template-columns: minmax(92px, 36%) minmax(0, 1fr);
          gap: 10px;
          border-bottom: 1px dashed #e2e8f0;
          padding: 7px 0;
          overflow-wrap: anywhere;
        }

        .feedback-table td:last-child {
          border-bottom: 0;
        }

        .feedback-table td::before {
          content: attr(data-label);
          color: #64748b;
          font-size: 11px;
          font-weight: 900;
          text-transform: uppercase;
        }
      }
    </style>
  </head>
  <body>
    <div class="feedback-dashboard">
      <header class="feedback-header">
        <div>
          <h1>Danh sách đánh giá mẫu phiếu chăm sóc</h1>
          <p id="feedbackUpdated">Đang tải dữ liệu...</p>
        </div>
        <a class="btn" href="../index.html">Về trang chủ</a>
      </header>

      <main class="feedback-main">
        <section class="feedback-stat-grid" id="feedbackStats"></section>

        <section class="feedback-filter" aria-label="Bộ lọc danh sách phản hồi">
          <div class="feedback-filter-field">
            <span id="feedbackDepartmentFilterLabel">Lọc theo khoa phòng</span>
            <div class="feedback-department-options" id="feedbackDepartmentFilter" role="group" aria-labelledby="feedbackDepartmentFilterLabel"></div>
          </div>
          <div class="feedback-filter-actions">
            <p class="feedback-filter-summary" id="feedbackFilterSummary"></p>
            <button class="btn" id="feedbackClearFilter" type="button" disabled>Bỏ lọc</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">Danh sách phiếu đánh giá</h2>
              <p class="panel-subtitle">Toàn bộ phản hồi đã gửi từ mẫu đánh giá.</p>
            </div>
          </div>
          <div class="panel-body">
            <div id="feedbackList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">5. Đóng góp ý kiến</h2>
              <p class="panel-subtitle">Tổng hợp nội dung hài lòng, cần cải thiện và đề xuất chức năng mới.</p>
            </div>
          </div>
          <div class="panel-body">
            <div id="feedbackComments"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Intl.DateTimeFormat("vi-VN", {
          dateStyle: "short",
          timeStyle: "short",
        }).format(new Date(value));
      }

      function percent(count, total) {
        if (!total) return "0%";
        return `${Math.round((count / total) * 100)}%`;
      }

      function selectedPercent(rows, field, acceptedValues) {
        const answered = rows.filter((row) => row[field]);
        const selected = answered.filter((row) => acceptedValues.includes(row[field]));
        return percent(selected.length, answered.length);
      }

      function emrStats(rows) {
        const answered = rows.filter((row) => row.emr_apply_wish);
        const normal = answered.filter((row) => row.emr_apply_wish === "Bình thường").length;
        const wanted = answered.filter((row) => row.emr_apply_wish === "Mong muốn").length;
        const highlyWanted = answered.filter((row) => row.emr_apply_wish === "Rất mong muốn").length;
        return {
          percent: percent(wanted + highlyWanted, answered.length),
          detail: [`Bình thường: ${normal}`, `Mong muốn: ${wanted}`, `Rất mong muốn: ${highlyWanted}`],
        };
      }

      let allFeedbackRows = [];
      const selectedDepartments = new Set();

      function rowsForSelectedDepartment() {
        return selectedDepartments.size
          ? allFeedbackRows.filter((row) => selectedDepartments.has(row.department))
          : allFeedbackRows;
      }

      function renderDepartmentFilter(rows) {
        const options = document.getElementById("feedbackDepartmentFilter");
        const departments = [...new Set(rows.map((row) => row.department).filter(Boolean))]
          .sort((left, right) => left.localeCompare(right, "vi"));
        options.innerHTML = departments.map((department) => `
          <label class="feedback-department-option">
            <input
              type="checkbox"
              data-department-filter="${escapeHtml(department)}"
              ${selectedDepartments.has(department) ? "checked" : ""}
            />
            <span>${escapeHtml(department)}</span>
          </label>
        `).join("");
      }

      function renderStats(rows) {
        const departments = new Set(rows.map((row) => row.department).filter(Boolean));
        const emr = emrStats(rows);
        const stats = [
          { label: "Tổng phản hồi", value: rows.length },
          { label: "Đơn vị/Khoa phòng", value: departments.size },
          { label: "Trải nghiệm tốt", value: selectedPercent(rows, "ui_easy", ["Tốt", "Rất tốt"]) },
          { label: "Hài lòng chung", value: selectedPercent(rows, "satisfaction", ["Hài lòng", "Rất hài lòng"]) },
          { label: "Mẫu phiếu dễ dùng", value: selectedPercent(rows, "current_care_form", ["Dễ sử dụng", "Rất dễ sử dụng"]) },
          { label: "Muốn áp dụng EMR", value: emr.percent, detail: emr.detail },
        ];
        document.getElementById("feedbackStats").innerHTML = stats.map(({ label, value, detail }) => `
          <div class="feedback-stat-card">
            <span>${escapeHtml(label)}</span>
            <strong>${escapeHtml(value)}</strong>
            ${detail ? `
              <div class="feedback-stat-detail">
                ${detail.map((line) => `<div>${escapeHtml(line)}</div>`).join("")}
              </div>
            ` : ""}
          </div>
        `).join("");
      }

      function renderList(rows) {
        if (!rows.length) {
          document.getElementById("feedbackList").innerHTML = `<div class="feedback-empty">Chưa có phản hồi.</div>`;
          return;
        }
        document.getElementById("feedbackList").innerHTML = `
          <div class="feedback-table-wrap">
            <table class="feedback-table">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Người gửi</th>
                  <th>Đơn vị</th>
                  <th>Trải nghiệm</th>
                  <th>Hài lòng</th>
                  <th>Tổng thể</th>
                  <th>Mẫu phiếu</th>
                  <th>Áp dụng EMR</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((row) => `
                  <tr>
                    <td data-label="Thời gian">${escapeHtml(formatDate(row.created_at))}</td>
                    <td data-label="Người gửi">${escapeHtml(row.full_name || "-")}</td>
                    <td data-label="Đơn vị">${escapeHtml(row.department || "-")}</td>
                    <td data-label="Trải nghiệm">${escapeHtml(row.ui_easy || "-")}<div class="feedback-muted">${escapeHtml(row.work_support || "")}</div></td>
                    <td data-label="Hài lòng">${escapeHtml(row.satisfaction || "-")}</td>
                    <td data-label="Tổng thể">${escapeHtml(row.overall || "-")}</td>
                    <td data-label="Mẫu phiếu">${escapeHtml(row.current_care_form || "-")}</td>
                    <td data-label="Áp dụng EMR">${escapeHtml(row.emr_apply_wish || "-")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderComments(rows) {
        const commentRows = rows.filter((row) => row.liked_most || row.need_improve || row.new_suggestion);
        if (!commentRows.length) {
          document.getElementById("feedbackComments").innerHTML = `<div class="feedback-empty">Chưa có ý kiến đóng góp.</div>`;
          return;
        }
        document.getElementById("feedbackComments").innerHTML = `
          <div class="feedback-table-wrap">
            <table class="feedback-table">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Đơn vị</th>
                  <th>Hài lòng nhất</th>
                  <th>Cần cải thiện</th>
                  <th>Đề xuất thêm</th>
                </tr>
              </thead>
              <tbody>
                ${commentRows.map((row) => `
                  <tr>
                    <td data-label="Thời gian">${escapeHtml(formatDate(row.created_at))}</td>
                    <td data-label="Đơn vị">${escapeHtml(row.department || "-")}</td>
                    <td data-label="Hài lòng nhất">${escapeHtml(row.liked_most || "-")}</td>
                    <td data-label="Cần cải thiện">${escapeHtml(row.need_improve || "-")}</td>
                    <td data-label="Đề xuất thêm">${escapeHtml(row.new_suggestion || "-")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderFilteredFeedback() {
        const rows = rowsForSelectedDepartment();
        renderStats(rows);
        renderList(rows);
        renderComments(rows);
        document.getElementById("feedbackFilterSummary").textContent = selectedDepartments.size
          ? `${rows.length}/${allFeedbackRows.length} phản hồi - ${selectedDepartments.size} khoa`
          : `${rows.length} phản hồi`;
        document.getElementById("feedbackClearFilter").disabled = !selectedDepartments.size;
      }

      async function loadFeedback() {
        const config = window.SUPABASE_CONFIG || {};
        if (!config.url || !config.anonKey) {
          throw new Error("Chưa cấu hình Supabase.");
        }
        const response = await fetch(`${config.url}/rest/v1/danh_gia_mau_phieu_cham_soc?select=*&order=created_at.desc`, {
          headers: {
            apikey: config.anonKey,
            Authorization: `Bearer ${config.anonKey}`,
          },
        });
        if (!response.ok) {
          const message = await response.text();
          throw new Error(message || `Supabase select failed (${response.status})`);
        }
        return await response.json();
      }

      loadFeedback()
        .then((rows) => {
          allFeedbackRows = rows;
          renderDepartmentFilter(rows);
          renderFilteredFeedback();
          document.getElementById("feedbackUpdated").textContent = `Cập nhật: ${formatDate(new Date().toISOString())}`;
        })
        .catch((error) => {
          document.getElementById("feedbackUpdated").textContent = "Không tải được dữ liệu.";
          document.getElementById("feedbackStats").innerHTML = "";
          document.getElementById("feedbackList").innerHTML = `<div class="feedback-empty">${escapeHtml(error.message || error)}</div>`;
          document.getElementById("feedbackComments").innerHTML = `<div class="feedback-empty">Chưa có dữ liệu.</div>`;
        });

      document.getElementById("feedbackDepartmentFilter").addEventListener("change", (event) => {
        const checkbox = event.target.closest("[data-department-filter]");
        if (!checkbox) return;
        if (checkbox.checked) {
          selectedDepartments.add(checkbox.dataset.departmentFilter);
        } else {
          selectedDepartments.delete(checkbox.dataset.departmentFilter);
        }
        renderFilteredFeedback();
      });

      document.getElementById("feedbackClearFilter").addEventListener("click", () => {
        selectedDepartments.clear();
        document.querySelectorAll("[data-department-filter]").forEach((checkbox) => {
          checkbox.checked = false;
        });
        renderFilteredFeedback();
      });
    </script>
  </body>
</html>
