<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách đánh giá mẫu phiếu chăm sóc</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        background: #f3f6fa;
      }

      .feedback-dashboard {
        min-height: 100vh;
      }

      .feedback-header {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid #dbe4ee;
        background: #fff;
      }

      .feedback-header h1 {
        margin: 0;
        color: #0f172a;
        font-size: 20px;
        line-height: 1.2;
      }

      .feedback-header p {
        margin: 3px 0 0;
        color: #64748b;
        font-size: 13px;
        font-weight: 700;
      }

      .feedback-main {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .feedback-stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }

      .feedback-stat-card {
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        background: #fff;
        padding: 13px;
      }

      .feedback-stat-card span {
        display: block;
        color: #64748b;
        font-size: 12px;
        font-weight: 800;
      }

      .feedback-stat-card strong {
        display: block;
        margin-top: 4px;
        color: #0f172a;
        font-size: 24px;
        line-height: 1.15;
      }

      .feedback-table-wrap {
        overflow-x: auto;
      }

      .feedback-table {
        width: 100%;
        min-width: 900px;
        border-collapse: collapse;
        font-size: 13px;
      }

      .feedback-table th,
      .feedback-table td {
        border-bottom: 1px solid #e2e8f0;
        padding: 9px 10px;
        text-align: left;
        vertical-align: top;
      }

      .feedback-table th {
        position: sticky;
        top: 0;
        background: #f8fafc;
        color: #334155;
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .feedback-table td {
        color: #0f172a;
      }

      .feedback-muted {
        color: #64748b;
        font-size: 12px;
      }

      .feedback-empty {
        border: 1px dashed #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        padding: 18px;
        color: #64748b;
        font-weight: 700;
        text-align: center;
      }

      @media (max-width: 640px) {
        .feedback-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .feedback-header .btn {
          width: 100%;
        }

        .feedback-main {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="feedback-dashboard">
      <header class="feedback-header">
        <div>
          <h1>Danh sách đánh giá mẫu phiếu chăm sóc</h1>
          <p id="feedbackUpdated">Đang tải dữ liệu...</p>
        </div>
        <a class="btn" href="../index.html">Về trang chủ</a>
      </header>

      <main class="feedback-main">
        <section class="feedback-stat-grid" id="feedbackStats"></section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">Danh sách phiếu đánh giá</h2>
              <p class="panel-subtitle">Toàn bộ phản hồi đã gửi từ mẫu đánh giá.</p>
            </div>
          </div>
          <div class="panel-body">
            <div id="feedbackList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">5. Đóng góp ý kiến</h2>
              <p class="panel-subtitle">Tổng hợp nội dung hài lòng, cần cải thiện và đề xuất chức năng mới.</p>
            </div>
          </div>
          <div class="panel-body">
            <div id="feedbackComments"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
      const ratingPositive = new Set(["Tốt", "Rất tốt", "Hài lòng", "Rất hài lòng", "Dễ sử dụng", "Rất dễ sử dụng", "Mong muốn", "Rất mong muốn", "Hiệu quả", "Rất hiệu quả"]);

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Intl.DateTimeFormat("vi-VN", {
          dateStyle: "short",
          timeStyle: "short",
        }).format(new Date(value));
      }

      function percent(count, total) {
        if (!total) return "0%";
        return `${Math.round((count / total) * 100)}%`;
      }

      function positivePercent(rows, field) {
        const answered = rows.filter((row) => row[field]);
        const positive = answered.filter((row) => ratingPositive.has(row[field]));
        return percent(positive.length, answered.length);
      }

      function renderStats(rows) {
        const departments = new Set(rows.map((row) => row.department).filter(Boolean));
        const stats = [
          ["Tổng phản hồi", rows.length],
          ["Đơn vị/Khoa phòng", departments.size],
          ["Trải nghiệm tốt", positivePercent(rows, "ui_easy")],
          ["Hài lòng chung", positivePercent(rows, "satisfaction")],
          ["Mẫu phiếu dễ dùng", positivePercent(rows, "current_care_form")],
          ["Muốn áp dụng EMR", positivePercent(rows, "emr_apply_wish")],
        ];
        document.getElementById("feedbackStats").innerHTML = stats.map(([label, value]) => `
          <div class="feedback-stat-card">
            <span>${escapeHtml(label)}</span>
            <strong>${escapeHtml(value)}</strong>
          </div>
        `).join("");
      }

      function renderList(rows) {
        if (!rows.length) {
          document.getElementById("feedbackList").innerHTML = `<div class="feedback-empty">Chưa có phản hồi.</div>`;
          return;
        }
        document.getElementById("feedbackList").innerHTML = `
          <div class="feedback-table-wrap">
            <table class="feedback-table">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Người gửi</th>
                  <th>Đơn vị</th>
                  <th>Trải nghiệm</th>
                  <th>Hài lòng</th>
                  <th>Tổng thể</th>
                  <th>Mẫu phiếu</th>
                  <th>Áp dụng EMR</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((row) => `
                  <tr>
                    <td>${escapeHtml(formatDate(row.created_at))}</td>
                    <td>${escapeHtml(row.full_name || "-")}</td>
                    <td>${escapeHtml(row.department || "-")}</td>
                    <td>${escapeHtml(row.ui_easy || "-")}<div class="feedback-muted">${escapeHtml(row.work_support || "")}</div></td>
                    <td>${escapeHtml(row.satisfaction || "-")}</td>
                    <td>${escapeHtml(row.overall || "-")}</td>
                    <td>${escapeHtml(row.current_care_form || "-")}</td>
                    <td>${escapeHtml(row.emr_apply_wish || "-")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderComments(rows) {
        const commentRows = rows.filter((row) => row.liked_most || row.need_improve || row.new_suggestion);
        if (!commentRows.length) {
          document.getElementById("feedbackComments").innerHTML = `<div class="feedback-empty">Chưa có ý kiến đóng góp.</div>`;
          return;
        }
        document.getElementById("feedbackComments").innerHTML = `
          <div class="feedback-table-wrap">
            <table class="feedback-table">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Đơn vị</th>
                  <th>Hài lòng nhất</th>
                  <th>Cần cải thiện</th>
                  <th>Đề xuất thêm</th>
                </tr>
              </thead>
              <tbody>
                ${commentRows.map((row) => `
                  <tr>
                    <td>${escapeHtml(formatDate(row.created_at))}</td>
                    <td>${escapeHtml(row.department || "-")}</td>
                    <td>${escapeHtml(row.liked_most || "-")}</td>
                    <td>${escapeHtml(row.need_improve || "-")}</td>
                    <td>${escapeHtml(row.new_suggestion || "-")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      async function loadFeedback() {
        const config = window.SUPABASE_CONFIG || {};
        if (!config.url || !config.anonKey) {
          throw new Error("Chưa cấu hình Supabase.");
        }
        const response = await fetch(`${config.url}/rest/v1/danh_gia_mau_phieu_cham_soc?select=*&order=created_at.desc`, {
          headers: {
            apikey: config.anonKey,
            Authorization: `Bearer ${config.anonKey}`,
          },
        });
        if (!response.ok) {
          const message = await response.text();
          throw new Error(message || `Supabase select failed (${response.status})`);
        }
        return await response.json();
      }

      loadFeedback()
        .then((rows) => {
          renderStats(rows);
          renderList(rows);
          renderComments(rows);
          document.getElementById("feedbackUpdated").textContent = `Cập nhật: ${formatDate(new Date().toISOString())}`;
        })
        .catch((error) => {
          document.getElementById("feedbackUpdated").textContent = "Không tải được dữ liệu.";
          document.getElementById("feedbackStats").innerHTML = "";
          document.getElementById("feedbackList").innerHTML = `<div class="feedback-empty">${escapeHtml(error.message || error)}</div>`;
          document.getElementById("feedbackComments").innerHTML = `<div class="feedback-empty">Chưa có dữ liệu.</div>`;
        });
    </script>
  </body>
</html>
